name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test (Zig ${{ matrix.zig-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        zig-version: ['0.13.0']

    steps:
      - uses: actions/checkout@v6

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ matrix.zig-version }}

      - name: Build
        run: zig build

      - name: Run unit tests
        run: zig build test
