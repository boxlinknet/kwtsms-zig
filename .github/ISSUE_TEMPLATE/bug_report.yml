name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue
      render: zig

  - type: input
    id: zig-version
    attributes:
      label: Zig version
      placeholder: e.g. 0.13.0

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Ubuntu 24.04, Windows 11, macOS 15
